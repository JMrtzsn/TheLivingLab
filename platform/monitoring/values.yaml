# kube-prometheus-stack - Kind-optimized configuration
# Disabled scrapers that don't work on Kind, low resource requests

## Grafana
grafana:
  adminPassword: "admin"
  service:
    type: ClusterIP
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.localhost
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
  persistence:
    enabled: false

## Prometheus
prometheus:
  prometheusSpec:
    retention: 24h
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        memory: 512Mi
    storageSpec: {}
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - prometheus.localhost

## Alertmanager
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi

## Disable components that don't work on Kind
## (control-plane components bind to 127.0.0.1 inside the container node,
##  unreachable from the pod network)
kubeEtcd:
  enabled: false
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false
kubeProxy:
  enabled: false

## Suppress corresponding alert rules (avoids false-positive "target down" alerts)
defaultRules:
  rules:
    etcd: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
    kubeControllerManager: false
    kubeProxy: false

## Node Exporter - low resources
prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      memory: 64Mi

## Kube State Metrics - low resources
kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
